<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Oil Price Widget – USOIL &amp; UKOIL</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .tradingview-widget-container {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>

  <!-- TradingView Widget BEGIN -->
  <div class="tradingview-widget-container" style="height:100%;width:100%">
    <div class="tradingview-widget-container__widget" style="height:calc(100% - 32px);width:100%"></div>
    <div class="tradingview-widget-copyright"><a href="https://www.tradingview.com/symbols/USOIL/?exchange=TVC" rel="noopener nofollow" target="_blank"><span class="blue-text">USOIL chart</span></a><span class="trademark"> by TradingView</span></div>
    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js" async>
    {
      "allow_symbol_change": true,
      "calendar": false,
      "details": false,
      "hide_side_toolbar": true,
      "hide_top_toolbar": false,
      "hide_legend": false,
      "hide_volume": false,
      "hotlist": false,
      "interval": "60",
      "locale": "en",
      "save_image": true,
      "style": "2",
      "symbol": "TVC:USOIL",
      "theme": "light",
      "timezone": "Australia/Sydney",
      "backgroundColor": "#ffffff",
      "gridColor": "rgba(46, 46, 46, 0.06)",
      "watchlist": [],
      "withdateranges": false,
      "compareSymbols": [
        {
          "symbol": "TVC:UKOIL",
          "position": "SameScale"
        }
      ],
      "studies": [],
      "autosize": true
    }
    </script>
  </div>
  <!-- TradingView Widget END -->

</body>
</html>
